<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АРГУМЕНТ LIVE — 2026</title>
<style>
:root { --red:#e30613; --green:#0a8; --dark:#000; --gray:#111; --text:#eee; }
body { margin:0; padding:0; font-family:'Segoe UI',sans-serif; background:var(--dark); color:var(--text); }
header { padding:12px 15px; background:var(--dark); border-bottom:2px solid var(--red); position:sticky; top:0; display:flex; justify-content:space-between; align-items:center; z-index:1000; }
#digital-clock{font-family:monospace;color:var(--red);font-size:18px;font-weight:bold;}
.container{max-width:850px;margin:auto;padding:15px;}
.player-box{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;margin-bottom:15px;}
iframe{width:100%;height:100%;border:none;}
.section-title{font-size:13px;color:var(--red);font-weight:bold;margin:20px 0 10px;border-left:3px solid var(--red);padding-left:10px;}
.alert{padding:10px;font-weight:bold;text-align:center;border-radius:6px;margin-bottom:10px;}
.alert.red{background:var(--red);}
.alert.green{background:var(--green);}
.news-item{display:block;padding:10px;text-decoration:none;color:#fff;border-bottom:1px solid #222;}
.news-meta{font-size:10px;color:var(--red);font-weight:bold;margin-bottom:3px;}
.side-menu{position:fixed;top:0;left:-100%;width:260px;height:100%;background:var(--gray);padding:20px;border-right:2px solid var(--red);transition:0.3s;overflow:auto;}
.side-menu.active{left:0;}
.menu-link{display:block;padding:12px;color:#fff;text-decoration:none;font-weight:bold;border-bottom:1px solid #222;cursor:pointer;}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="menu-btn" onclick="document.getElementById('sideMenu').classList.toggle('active')">☰</button>
    <div style="font-size:18px;font-weight:bold;">АРГУМЕНТ <span style="color:var(--red)">LIVE</span></div>
  </div>
  <div id="digital-clock">00:00:00</div>
</header>

<div class="container">

  <div id="alertBox"></div>

  <div class="player-box">
    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC-VP7uBgZvooMsjP5TNNPLw" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <span class="section-title">🗞️ ГАРЯЧІ НОВИНИ</span>
  <div id="news-container"></div>

</div>

<div id="sideMenu" class="side-menu">
  <div style="text-align:right;margin-bottom:20px;">
    <span onclick="document.getElementById('sideMenu').classList.remove('active')" style="cursor:pointer;color:var(--red);font-size:24px;">✕</span>
  </div>
  <div class="menu-link" onclick="showJoke()">🎭 АНЕКДОТ ДНЯ</div>
  <div class="menu-link" onclick="showHoroscope()">🔮 ГОРОСКОП</div>
</div>

<script>
// --- ГОДИННИК ---
function updateClock(){ document.getElementById('digital-clock').textContent = new Date().toLocaleTimeString('uk-UA'); }
setInterval(updateClock,1000); updateClock();

// --- ТРИВОГА (API raid.fly.dev) ---
// Повертає об’єкт із областями і boolean статусами 
async function checkAirRaid(){
  try{
    const res = await fetch('https://raid.fly.dev/states'); // API неофіційний для областей тривог [oai_citation_attribution:2‡raid.fly.dev](https://raid.fly.dev/?utm_source=chatgpt.com)
    const data = await res.json();
    const alertActive = data["Одеська область"] === true;
    const box = document.getElementById('alertBox');
    if(alertActive){
      box.textContent="🚨 ТРИВОГА! Одеська область";
      box.className="alert red";
    } else {
      box.textContent="✅ ВІДБІЙ! Одеська область";
      box.className="alert green";
    }
  }catch(e){ console.error("Помилка тривоги",e);}
}
setInterval(checkAirRaid,15000);
checkAirRaid();

// --- НОВИНИ з кешем ---
const CACHE_KEY="newsCache",CACHE_TIME_KEY="newsCacheTime",CACHE_DURATION=5*60*1000;
async function fetchNews(){
  const now=Date.now(), cached=localStorage.getItem(CACHE_KEY), time=localStorage.getItem(CACHE_TIME_KEY);
  if(cached && time && now - time < CACHE_DURATION){
    document.getElementById('news-container').innerHTML=cached;
    return;
  }
  const proxy="https://api.rss2json.com/v1/api.json?rss_url=";
  const sources=[
    {name:"УП",url:"https://www.pravda.com.ua/rss/"},
    {name:"ТСН",url:"https://tsn.ua/rss/full.rss"},
    {name:"24 КАНАЛ",url:"https://24tv.ua/rss/all.xml"},
    {name:"СУСПІЛЬНЕ",url:"https://suspilne.media/rss/feeds/all.xml"},
    {name:"УНІАН",url:"https://rss.unian.net/site/news_ukr.rss"},
    {name:"АПОСТРОФ",url:"https://apostrophe.ua/ua/rss"}
  ];
  let allNews=[];
  for(let src of sources){
    try{
      const r=await fetch(proxy+encodeURIComponent(src.url));
      const d=await r.json();
      if(d.items) d.items.forEach(i=> allNews.push({title:i.title,link:i.link,date:new Date(i.pubDate),source:src.name}));
    }catch(e){}
  }
  allNews.sort((a,b)=>b.date-a.date);
  const html=allNews.slice(0,50).map(n=>`
    <a href="${n.link}" target="_blank" class="news-item">
      <div class="news-meta">${n.source} | ${n.date.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'})}</div>
      <div style="font-weight:500;line-height:1.4;">${n.title}</div>
    </a>`).join('');
  document.getElementById('news-container').innerHTML=html;
  localStorage.setItem(CACHE_KEY,html);
  localStorage.setItem(CACHE_TIME_KEY,now);
}
fetchNews(); setInterval(fetchNews,300000);

// --- АНЕКДОТИ 50 ---
const jokes=[
 "Питають у козака: 'Чому ти з шаблею у метро?' — 'Зручно, не губиться.'",

 "Мене питають: 'Ти хто за знаком зодіаку?' Я кажу: 'Голодний'.",
 "Вчитель: 'Де твій зошит?' Учень: 'Котик з’їв.' Той котик був веган.",
 "— Я знаю три мови. — Які? — Українська, сарказм, і сарказм.",
 "Якби люди сміялися частіше, то не було б стільки людей у смітнику.",
 "Хто рано встає — тому Бог дає каву.",
 "Скільки програмістів потрібно, щоб вкрутити лампочку? Жодного — це апаратна проблема.",

 "— Де ти працюєш? — В інтернеті. — Але де саме? — Всі питають.",
 "Дружина каже: 'Ти не слухаєш'… Я відповідаю: 'Що?'",
 "Коли життя дає лимони — проси сіль і текілу.",
 "Що важче: тонка книга, чи товста думка?",
 "Пішов до лікаря за здоровим глуздом — сказали повернутись завтра.",
 "Як зрозуміти, що черга довга? Коли навіть твій котик втомився.",
 "Немає поганої погоди — є лише поганий настрій у програміста.",
 "Купив шафу — досі шукаю де зберігаються речі.",
 "Запізнився на роботу, бо встав на ранок.",

 "Оптиміст — це той хто бачить світло Wi‑Fi.",
 "Мрії збуваються тоді, коли перестаєш спати дорого.",
 "Гумор — це сон для серйозних людей.",
 "Життя — це серія жартів.",
 "Світ такий, як ти його бачиш.",
 "Якщо життя дає помилки — кодуй їх.",
 "Ти не прогулюєш — ти набираєш досвіду.",
 "Усмішка — за межами смутку.",
 "Навіть коти сміються.",

function showJoke(){ alert(jokes[Math.floor(Math.random()*jokes.length)]); }

// --- ГОРОСКОП ---
const horoscope=[{sign:"Овен",text:"Сьогодні гарний день для нових починань."},
{sign:"Телець",text:"Сприятливий день для фінансів."},
{sign:"Близнюки",text:"Будьте уважні до деталей."},
{sign:"Рак",text:"Емоції можуть взяти верх."},
{sign:"Лев",text:"Це день для лідерства."},
{sign:"Діва",text:"Приділіть увагу здоров’ю."},
{sign:"Терези",text:"Балансуйте роботу і відпочинок."},
{sign:"Скорпіон",text:"Інтуїція допоможе."},
{sign:"Стрілець",text:"Нові ідеї принесуть успіх."},
{sign:"Козеріг",text:"Терпіння принесе результат."},
{sign:"Водолій",text:"Творчість сьогодні важлива."},
{sign:"Риби",text:"Слухайте свою інтуїцію."}];
function showHoroscope(){
  let msg = "Гороскоп:\n\n";
  horoscope.forEach(h=>msg+=`${h.sign}: ${h.text}\n`);
  alert(msg);
}
</script>
</body>
</html>
