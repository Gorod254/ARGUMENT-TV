<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРГУМЕНТ TV - БАЛТА</title>
    <!-- Підключаємо плеєр для m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { background: #000; padding: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #e30613; position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; flex-direction: column; }
        .logo-text { font-size: 20px; font-weight: bold; color: #fff; text-decoration: none; text-transform: uppercase; }
        .logo-red { color: #e30613; }
        .burger { font-size: 28px; cursor: pointer; color: #fff; background: none; border: none; padding: 0 15px; }
        
        .ticker-container { background: #111; color: #fff; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #333; font-weight: bold; }

        .main-content { padding: 10px; max-width: 900px; margin: 0 auto; }
        
        /* Стиль Плеєра */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        video { width: 100%; height: 100%; }

        /* Меню */
        .side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #111; z-index: 2000; transition: 0.4s; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 2px solid #e30613; }
        .side-menu.active { left: 0; }
        .side-menu a { color: white; text-decoration: none; display: block; padding: 12px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .side-menu button { width: 100%; padding: 12px; background: #e30613; color: white; border: none; border-radius: 5px; margin: 15px 0; font-weight: bold; cursor: pointer; }

        .section-title { color: #e30613; text-transform: uppercase; font-size: 12px; font-weight: bold; margin: 15px 0 10px; display: block; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <button class="burger" onclick="toggleMenu()">☰</button>
    <div class="logo-area">
        <a href="#" class="logo-text">АРГУМЕНТ <span class="logo-red">TV</span></a>
        <small style="font-size: 9px; color: #888;">ТВІЙ ГОЛОВНИЙ АРГУМЕНТ</small>
    </div>
    <div id="clock" style="font-family: monospace; font-size: 18px; font-weight: bold; color: #fff;">00:00:00</div>
</header>

<div class="ticker-container">
    <marquee behavior="scroll" direction="left">
        🔴 ПРЯМИЙ ЕФІР АРГУМЕНТ TV | НОВИНИ БАЛТЩИНИ | 💲 КУРС ВАЛЮТ НБУ: USD: 41.25 | EUR: 44.60 | GBP: 52.30 | PLN: 10.35 | MDL: 2.31 🔴
    </marquee>
</div>

<div class="main-content">
    <!-- ПЛЕЄР M3U8 -->
    <div class="video-box">
        <video id="video" controls autoplay playsinline muted></video>
    </div>

    <!-- КАРТА ТРИВОГ -->
    <span class="section-title">Оперативна карта тривог</span>
    <div style="width: 100%; height: 450px; border-radius: 8px; overflow: hidden; background: #111; border: 1px solid #333;">
        <iframe src="https://alerts.in.ua/" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
</div>

<!-- БІЧНЕ МЕНЮ -->
<div id="sideMenu" class="side-menu">
    <a href="javascript:void(0)" onclick="toggleMenu()" style="color: #e30613; font-weight: bold; text-align: center;">✖ ЗАКРИТИ МЕНЮ</a>
    
    <a href="https://www.facebook.com/groups/balta.city" target="_blank">🌐 Facebook Балта</a>
    <a href="https://balta-otg.gov.ua/" target="_blank">🏛 Офіційні новини ОТГ</a>
    
    <button onclick="showJoke()">🎭 АНЕКДОТ ДНЯ (БАЛТА)</button>

    <!-- ГОРОСКОП -->
    <div style="background: #1a1a1a; padding: 12px; border-radius: 5px; margin-top: 10px; border: 1px solid #333;">
        <span style="color: #e30613; font-size: 11px; font-weight: bold;">🔮 БАЛТСЬКИЙ ГОРОСКОП</span>
        <select id="zodiac" onchange="runHoro()" style="width:100%; margin-top:8px; background:#000; color:#fff; border:1px solid #e30613; padding:6px; border-radius: 4px;">
            <option value="">Оберіть свій знак...</option>
            <option value="Овен">Овен ♈</option><option value="Телець">Телець ♉</option>
            <option value="Близнюки">Близнюки ♊</option><option value="Рак">Рак ♋</option>
            <option value="Лев">Лев ♌</option><option value="Діва">Діва ♍</option>
            <option value="Терези">Терези ♎</option><option value="Скорпіон">Скорпіон ♏</option>
            <option value="Стрілець">Стрілець ♐</option><option value="Козеріг">Козеріг ♑</option>
            <option value="Водолій">Водолій ♒</option><option value="Риби">Риби ♓</option>
        </select>
        <p id="h-out" style="font-size: 12px; color: #ccc; margin-top: 10px; font-style: italic;"></p>
    </div>

    <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">

    <!-- ЧАТ -->
    <span class="section-title">Чат громади</span>
    <div style="width: 100%; height: 350px; border-radius: 5px; overflow: hidden; border: 1px solid #333;">
        <iframe src="https://argument-tv.chatango.com" width="100%" height="100%" frameborder="0"></iframe>
    </div>
</div>

<script>
    // 1. ПЛЕЄР M3U8 (Встав своє посилання сюди)
    const video = document.getElementById('video');
    const videoSrc = 'https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8'; // Я поставив приклад, заміни на своє, якщо посилання інше

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
    }

    // 2. ГОДИННИК
    function tick() {
        document.getElementById('clock').innerHTML = new Date().toLocaleTimeString('uk-UA');
    }
    setInterval(tick, 1000); tick();

    // 3. МЕНЮ
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
    }

    // 4. АНЕКДОТИ (15 шт)
    function showJoke() {
        const j = [
            "У Балті на ринку: — Жіночко, чого ваша ковбаса така дорога? — Бо вона з Подільська пішки йшла!",
            "Новини Аргумент TV: В Балті зафіксовано аномалію — людина пройшла повз 'Копійку' і нічого не купила.",
            "Прикмета: Якщо на балтському ринку тихо — значить, сьогодні понеділок.",
            "Тільки в Балті таксист знає кожну ямку по імені та по батькові.",
            "Балтська дієта: Кава біля собору зранку, насіння на лавці ввечері.",
            "В Балті найшвидший інтернет — це коли кума глянула в вікно і через 5 хв все місто знає подробиці.",
            "Балтський джентльмен завжди притримає двері куму, особливо якщо той несе два мішки картоплі.",
            "Оголошення: Вивезу сміття. Дорого. Красиво. З музикою Аргумент TV.",
            "У Балтській мерії: — Чому в нас дороги криві? — Щоб ворог не доїхав до вокзалу!",
            "— Тату, я хочу бути космонавтом! — Ні, синку, будеш таксистом у Балті, там ями як на Місяці.",
            "Тільки в Балті можна почути: — Я за вами стояв ще коли долар був по вісім!",
            "— Ваші яблука місцеві? — Звісно! Вранці ще на дереві в Пасаті висіли!",
            "Чому в Балті не потрібні GPS? Бо кожна бабуся знає, куди ти йдеш і навіщо.",
            "Коли в Балті випадає сніг, таксисти автоматично стають пілотами всюдиходів.",
            "В Балті відкрили Аргумент TV. Тепер плітки поширюються швидше за світло!"
        ];
        alert(j[Math.floor(Math.random() * j.length)]);
    }

    // 5. ГОРОСКОП
    function runHoro() {
        const s = document.getElementById('zodiac').value;
        const o = document.getElementById('h-out');
        const p = [
            "Сьогодні вдалий день для покупок на ринку. Будуть знижки!",
            "Зірки радять сьогодні дивитись Аргумент TV — дізнаєтесь щось цікаве.",
            "Чекайте приємних новин від кумів або сусідів.",
            "Не витрачайте все в 'Копійці' сьогодні, прибережіть копійчину.",
            "Сприятливий день для прогулянки біля собору або вздовж Кодими.",
            "Сьогодні ви зустрінете старого знайомого біля переїзду."
        ];
        if(s) o.innerHTML = "<strong>" + s + ":</strong> " + p[Math.floor(Math.random() * p.length)];
    }
</script>

</body>
</html>
