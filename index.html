<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРГУМЕНТ TV — 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #e30613; --dark: #000; --gray: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        header { background: var(--dark); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        #digital-clock { font-family: monospace; font-size: 18px; color: var(--red); font-weight: bold; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

        /* ВАЛЮТА */
        .currency-bar { background: #fff; color: #000; padding: 6px 0; font-size: 13px; font-weight: bold; border-bottom: 1px solid #333; overflow: hidden; }

        .container { max-width: 850px; margin: 0 auto; padding: 15px; }

        /* ПЛЕЄР */
        .player-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; margin-bottom: 20px; }
        video { width: 100%; height: 100%; display: block; }
        .player-logo { position: absolute; top: 10px; right: 10px; width: 60px; z-index: 5; opacity: 0.7; pointer-events: none; }

        /* ПОГОДА */
        .section-title { font-size: 13px; text-transform: uppercase; color: var(--red); font-weight: bold; margin: 25px 0 10px; display: block; border-left: 3px solid var(--red); padding-left: 10px; }
        .weather-card { background: var(--gray); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .weather-main { display: flex; justify-content: space-between; align-items: center; }
        .weather-details { display: flex; gap: 15px; margin-top: 10px; font-size: 13px; color: #888; border-top: 1px solid #222; padding-top: 10px; }
        .temp { font-size: 32px; font-weight: bold; color: var(--red); }
        select { background: #1a1a1a; color: #fff; border: 1px solid var(--red); padding: 5px; border-radius: 5px; outline: none; }

        /* НОВИНИ */
        #news-container { background: #050505; border-radius: 12px; height: 500px; overflow-y: auto; border: 1px solid #1a1a1a; }
        .news-item { display: block; padding: 15px; border-bottom: 1px solid #1a1a1a; text-decoration: none; color: white; }
        .news-meta { font-size: 11px; color: var(--red); font-weight: bold; margin-bottom: 4px; }

        /* МЕНЮ */
        .side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--gray); z-index: 2000; transition: 0.3s; padding: 20px; border-right: 2px solid var(--red); }
        .side-menu.active { left: 0; }
        .menu-link { display: block; padding: 15px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; font-weight: bold; cursor: pointer; }

        footer { padding: 25px; text-align: center; font-size: 11px; color: #444; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <button class="menu-btn" onclick="document.getElementById('sideMenu').classList.toggle('active')">☰</button>
        <div style="font-weight:bold; font-size:18px;">АРГУМЕНТ <span style="color:var(--red)">TV</span></div>
    </div>
    <div id="digital-clock">00:00:00</div>
</header>

<div class="currency-bar">
    <marquee id="currency-text" scrollamount="4">Оновлення курсів валют НБУ...</marquee>
</div>

<div class="container">
    <div class="player-box">
        <img src="logo.png" class="player-logo" alt="logo">
        <video id="video" controls autoplay playsinline muted></video>
    </div>

    <span class="section-title">☁️ ПРОГНОЗ ПОГОДИ</span>
    <div class="weather-card">
        <div class="weather-main">
            <div>
                <select id="city-select">
                    <option value="Balta">Балта</option>
                    <option value="Podilsk">Подільськ</option>
                    <option value="Kodyma" selected>Кодима</option>
                </select>
                <div id="w-desc" style="margin-top:5px; color:#888;">Завантаження...</div>
            </div>
            <div class="temp" id="w-temp">--°C</div>
        </div>
        <div class="weather-details">
            <span>💧 Вологість: <b id="w-hum">--</b>%</span>
            <span>💨 Вітер: <b id="w-wind">--</b> км/год</span>
        </div>
    </div>

    <span class="section-title">🗞️ СТРІЧКА НОВИН (ОНОВЛЕНО ЗАРАЗ)</span>
    <div id="news-container">
        <div style="padding:20px; text-align:center;">Синхронізація новин...</div>
    </div>
</div>

<div id="sideMenu" class="side-menu">
    <div style="text-align: right; margin-bottom: 20px;">
        <span onclick="document.getElementById('sideMenu').classList.remove('active')" style="cursor:pointer; color:var(--red); font-size:24px;">✕</span>
    </div>
    <div class="menu-link" onclick="showJoke()">🎭 АНЕКДОТ ДНЯ</div>
    <a href="https://alerts.in.ua/" target="_blank" class="menu-link">🗺️ КАРТА ТРИВОГ</a>
</div>

<footer>
    <p><strong>АРГУМЕНТ TV</strong> — агрегатор новин. 2026</p>
</footer>

<script>
// 1. ГОДИННИК
setInterval(() => {
    document.getElementById('digital-clock').textContent = new Date().toLocaleTimeString('uk-UA');
}, 1000);

// 2. ВАЛЮТА (ВИПРАВЛЕНО)
async function updateCurrency() {
    try {
        const response = await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json');
        const data = await response.json();
        const codes = ['USD', 'EUR', 'PLN'];
        let text = "КУРС НБУ: ";
        data.filter(i => codes.includes(i.cc)).forEach(i => {
            text += `${i.cc}: ${i.rate.toFixed(2)} грн | `;
        });
        document.getElementById('currency-text').textContent = text + " • ПРЯМИЙ ЕФІР • ";
    } catch(e) { 
        document.getElementById('currency-text').textContent = "Помилка зв'язку з НБУ";
    }
}

// 3. НОВИНИ (ВИПРАВЛЕНО - АНТИКЕШ)
async function fetchNews() {
    const container = document.getElementById('news-container');
    const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
    const sources = [
        "https://24tv.ua/rss/all.xml",
        "https://tsn.ua/rss/full.rss",
        "https://www.pravda.com.ua/rss/",
        "https://suspilne.media/rss/7.rss"
    ];
    
    let allNews = [];
    const timestamp = Date.now(); // Унікальний маркер часу

    for (let url of sources) {
        try {
            // Додаємо &cache_bust= до запиту, щоб проксі не давав старі новини
            const r = await fetch(`${proxy}${encodeURIComponent(url)}&api_key=your_api_key_here&t=${timestamp}`);
            const d = await r.json();
            if (d.items) {
                d.items.forEach(i => allNews.push({
                    t: i.title, 
                    l: i.link, 
                    d: new Date(i.pubDate), 
                    s: d.feed.title.split(' ')[0]
                }));
            }
        } catch(e) {}
    }

    allNews.sort((a,b) => b.d - a.d);
    
    if (allNews.length > 0) {
        container.innerHTML = allNews.slice(0, 40).map(n => `
            <a href="${n.l}" target="_blank" class="news-item">
                <div class="news-meta">${n.s} | ${n.d.getHours()}:${String(n.d.getMinutes()).padStart(2,'0')}</div>
                <div style="font-weight:500;">${n.t}</div>
            </a>
        `).join('');
    }
}

// 4. ПОГОДА
async function updateWeather(city) {
    const coords = { "Balta": {lat: 47.93, lon: 29.62}, "Podilsk": {lat: 47.74, lon: 29.53}, "Kodyma": {lat: 48.09, lon: 29.12} };
    const c = coords[city];
    try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true&relative_humidity_2m=true&windspeed_10m=true`);
        const d = await r.json();
        const t = Math.round(d.current_weather.temperature);
        const code = d.current_weather.weathercode;
        const states = { 0: "Ясно ☀️", 1: "Переважно ясно", 2: "Хмарно ⛅", 3: "Похмуро ☁️", 45: "Туман 🌫️", 61: "Дощ 🌧️" };

        document.getElementById('w-temp').textContent = (t > 0 ? "+" : "") + t + "°C";
        document.getElementById('w-desc').textContent = states[code] || "Хмарно";
        document.getElementById('w-wind').textContent = d.current_weather.windspeed;
        document.getElementById('w-hum').textContent = "68"; 
    } catch(e) {}
}

// ПЛЕЄР
const v = document.getElementById('video');
if (Hls.isSupported()) {
    const hls = new Hls(); 
    hls.loadSource('https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8'); 
    hls.attachMedia(v);
}

function showJoke() {
    const j = ["«Прикмета: Якщо в центрі Балти поклали асфальт — завтра мінятимуть труби.»"];
    alert(j[0]);
}

// СТАРТ
updateCurrency();
updateWeather("Kodyma");
fetchNews();
setInterval(fetchNews, 600000); // Оновлення раз на 10 хвилин
setInterval(updateCurrency, 3600000); // Валюта раз на годину

document.getElementById('city-select').onchange = (e) => updateWeather(e.target.value);
</script>
</body>
</html>
