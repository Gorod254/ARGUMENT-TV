<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аргумент TV - Балта</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { background-color: #000; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #e30613; position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; flex-direction: column; }
        .logo-main { font-size: 24px; font-weight: bold; color: #fff; text-decoration: none; }
        .logo-red { color: #e30613; }
        .burger { font-size: 30px; cursor: pointer; color: #fff; background: none; border: none; }
        
        /* Бічне меню */
        .side-menu { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: #111; z-index: 2000; transition: 0.4s; padding: 20px; box-sizing: border-box; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .side-menu.active { left: 0; }
        .side-menu a { color: white; text-decoration: none; display: block; padding: 12px 0; border-bottom: 1px solid #222; font-size: 1rem; }
        .side-menu button { width: 100%; padding: 12px; background: #e30613; color: white; border: none; border-radius: 5px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        
        .container { padding: 10px; max-width: 800px; margin: 0 auto; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #111; margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .info-bar { background: #111; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; border-left: 4px solid #e30613; }
        .section-title { color: #e30613; text-transform: uppercase; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: block; text-align: center; }
    </style>
</head>
<body>

<header>
    <button class="burger" onclick="toggleMenu()">☰</button>
    <div class="logo-area">
        <a href="#" class="logo-main">АРГУМЕНТ <span class="logo-red">TV</span></a>
        <small style="font-size: 10px; color: #888;">ТВІЙ ГОЛОВНИЙ АРГУМЕНТ</small>
    </div>
    <div id="clock" style="font-family: monospace; font-size: 18px; font-weight: bold;">00:00:00</div>
</header>

<div class="container">
    <!-- Ефір -->
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UC7_h0_9IqI-I" allowfullscreen></iframe>
    </div>

    <!-- Карта тривог -->
    <span class="section-title">Оперативна карта тривог</span>
    <div style="width: 100%; height: 400px; border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
        <iframe src="https://alerts.in.ua/" style="width: 100%; height: 100%;"></iframe>
    </div>
</div>

<!-- БІЧНЕ МЕНЮ -->
<div id="sideMenu" class="side-menu">
    <a href="javascript:void(0)" onclick="toggleMenu()" style="color: #e30613; text-align: right; font-size: 20px;">✖</a>
    <a href="https://www.facebook.com/groups/balta.city" target="_blank">🌐 Наш Facebook (Балта)</a>
    <a href="https://balta-otg.gov.ua/" target="_blank">🏛 Новини Балтської ОТГ</a>
    
    <button onclick="showJoke()">🎭 АНЕКДОТ ДНЯ</button>

    <div style="margin-top: 20px; background: #222; padding: 15px; border-radius: 8px;">
        <span style="color: #e30613; font-size: 0.8rem;">🔮 БАЛТСЬКИЙ ГОРОСКОП</span>
        <select id="zodiac" onchange="getHoroscope()" style="width: 100%; margin-top: 10px; padding: 8px; background: #000; color: #fff; border: 1px solid #444;">
            <option value="">Обери знак...</option>
            <option value="Овен">Овен</option><option value="Телець">Телець</option><option value="Близнюки">Близнюки</option>
            <option value="Рак">Рак</option><option value="Лев">Лев</option><option value="Діва">Діва</option>
            <option value="Терези">Терези</option><option value="Скорпіон">Скорпіон</option><option value="Стрілець">Стрілець</option>
            <option value="Козеріг">Козеріг</option><option value="Водолій">Водолій</option><option value="Риби">Риби</option>
        </select>
        <p id="horoText" style="font-size: 0.8rem; margin-top: 10px; color: #ccc;"></p>
    </div>

    <div style="margin-top: 20px;">
        <span class="section-title">Чат громади</span>
        <iframe src="https://argument-tv.chatango.com" width="100%" height="300" frameborder="0"></iframe>
    </div>
</div>

<script>
    // Годинник
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('uk-UA');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Меню
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
    }

    // Анекдоти (15 шт)
    function showJoke() {
        const jokes = [
            "У Балті на ринку: — Жіночко, чого ваша ковбаса така дорога? — Бо вона з Подільська пішки йшла!",
            "Новини Аргумент TV: В Балті зафіксовано аномалію — людина пройшла повз 'Копійку' і нічого не купила.",
            "Прикмета: Якщо на балтському ринку тихо — значить, сьогодні понеділок.",
            "В Балті відкрили новий телеканал Аргумент TV. Тепер плітки поширюються зі швидкістю світла!",
            "Балтський джентльмен завжди поступається місцем дамі, якщо вона несе два кавуни з ринку.",
            "Оголошення: Продам ями на дорозі. Самовивіз. Бюджет Балти.",
            "Тільки в Балті таксист може розповісти історію міста краще за будь-якого екскурсовода.",
            "— Куме, а ви знаєте, що в Балті інтернет 5G? — Та я знаю, кума в вікно глянула і вже все місто знає!",
            "У Балтській мерії: — Чому в нас такі дороги? — Щоб туристи довше милувалися краєвидами!",
            "Зустрілися двоє в Балті: — Ти куди? — На вокзал. — О, в Подільськ? — Ні, подивитися на поїзд, кажуть, він справжній!",
            "Балтська дієта: Кава біля собору зранку, насіння на лавці ввечері.",
            "— Тату, я хочу бути таксистом у Балті! — Ні, синку, там треба знати кожну ямку по імені.",
            "На ринку: — Ваші яблука точно місцеві? — Звісно! Вранці ще на дереві в Пасаті висіли!",
            "В Балті найшвидший зв'язок — це коли сусіди побачили, що ти купив новий телевізор.",
            "Чому в Балті не потрібні GPS? Бо кожна бабуся біля під'їзду знає, куди ти йдеш!"
        ];
        alert(jokes[Math.floor(Math.random() * jokes.length)]);
    }

    // Гороскоп
    function getHoroscope() {
        const sign = document.getElementById('zodiac').value;
        const out = document.getElementById('horoText');
        if(!sign) return;
        const predicts = [
            "День вдалий для походу на балтський ринок. Знайдете знижки!",
            "Зірки радять подивитися Аргумент TV — дізнаєтесь щось важливе.",
            "Будьте обережні з таксистами, вони сьогодні надто говіркі.",
            "Вечір принесе приємні новини від кумів.",
            "Фінансовий успіх чекає на тих, хто не витратить усе в 'Копійці'.",
            "Сприятливий день для прогулянки біля собору."
        ];
        out.innerHTML = "<strong>" + sign + ":</strong> " + predicts[Math.floor(Math.random() * predicts.length)];
    }
</script>

</body>
</html>
