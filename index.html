<script>
// 1. НАЛАШТУВАННЯ
const CONFIG = {
    coords: {
        "Balta": {lat: 47.93, lon: 29.62}, "Podilsk": {lat: 47.74, lon: 29.53},
        "Kodyma": {lat: 48.09, lon: 29.12}, "Ananiv": {lat: 47.72, lon: 29.96},
        "Liubashivka": {lat: 47.83, lon: 30.25}, "Savran": {lat: 48.13, lon: 30.08},
        "Pishchana": {lat: 48.20, lon: 29.75}, "Zelenogirske": {lat: 47.84, lon: 30.22},
        "Slobidka": {lat: 47.88, lon: 29.35}, "Okny": {lat: 47.53, lon: 29.46}
    }
};

// 2. ГОДИННИК ТА ВАЛЮТА (Працюють автономно)
function startCore() {
    setInterval(() => {
        const el = document.getElementById('digital-clock');
        if(el) el.textContent = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

    fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json')
        .then(r => r.json()).then(data => {
            const codes = ['USD', 'EUR', 'GBP', 'PLN', 'MDL'];
            let text = "Курс НБУ: ";
            data.filter(i => codes.includes(i.cc)).forEach(i => {
                text += `${i.cc}: ${i.rate.toFixed(2)} | `;
            });
            document.querySelector('.currency-bar marquee').textContent = text;
        }).catch(() => {});
}

// 3. ПОГОДА (З виправленням для мобільних)
async function updateWeather(city) {
    const c = CONFIG.coords[city] || CONFIG.coords["Balta"];
    const weatherText = document.querySelector('.desc');
    const tempText = document.querySelector('.temp');
    
    try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true`);
        const d = await r.json();
        const t = Math.round(d.current_weather.temperature);
        const code = d.current_weather.weathercode;
        
        let desc = "Ясно";
        if (code > 0 && code < 4) desc = "Хмарно";
        else if (code >= 51) desc = "Опади";
        
        if(tempText) tempText.textContent = t + "°C";
        if(weatherText) weatherText.textContent = desc;
    } catch(e) { 
        if(weatherText) weatherText.textContent = "Оновлення..."; 
    }
}

// 4. НОВИНИ
async function fetchNews() {
    const container = document.getElementById('news-container');
    const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
    const sources = {
        "УП": "https://www.pravda.com.ua/rss/", "Громадське": "https://hromadske.ua/rss",
        "Суспільне": "https://suspilne.media/rss/99.rss", "Думська": "https://dumskaya.net/rssnews.xml"
    };

    let allNews = [];
    for (let [name, url] of Object.entries(sources)) {
        try {
            const r = await fetch(proxy + encodeURIComponent(url));
            const d = await r.json();
            if (d.items) {
                d.items.forEach(item => {
                    allNews.push({
                        title: item.title, link: item.link,
                        time: new Date(item.pubDate.replace(/-/g, "/")), source: name
                    });
                });
            }
        } catch (e) {}
    }
    allNews.sort((a, b) => b.time - a.time);
    const limit = new Date(Date.now() - 8 * 60 * 60 * 1000);
    if(container) container.innerHTML = allNews.filter(n => n.time > limit).map(n => `
        <a href="${n.link}" target="_blank" class="news-item" style="display:block; padding:12px; border-bottom:1px solid #222; text-decoration:none; color:white;">
            <div style="font-size:0.8rem; color:#e30613;">${n.source} | ${n.time.getHours()}:${String(n.time.getMinutes()).padStart(2, '0')}</div>
            <div style="font-weight:bold;">${n.title}</div>
        </a>
    `).join('');
}

// 5. МЕНЮ ТА ВЗАЄМОДІЯ (Touch-friendly)
function initInteractions() {
    const menu = document.getElementById('sideMenu');
    const menuBtn = document.getElementById('menuBtn');
    const liveInd = document.querySelector('.live-indicator');

    // LIVE Текст
    if(liveInd) liveInd.innerHTML = 'АРГУМЕНТ <span style="color:#e30613">TV</span>';

    // Керування меню
    if(menuBtn && menu) {
        menuBtn.onclick = (e) => {
            e.stopPropagation();
            menu.classList.toggle('active');
        };

        // Закриття меню при дотику до будь-чого іншого
        document.addEventListener('touchstart', (e) => {
            if (!menu.contains(e.target) && menu.classList.contains('active')) {
                menu.classList.remove('active');
            }
        }, {passive: true});
        
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    }

    // Радіо
    const r = document.getElementById('radio-player');
    const b = document.getElementById('playRadio');
    if(b && r) {
        b.onclick = () => {
            if (r.paused) { r.play(); b.textContent = "STOP"; }
            else { r.pause(); b.textContent = "PLAY"; }
        };
    }

    // Анекдоти
    const jBtn = document.getElementById('jokeBtn');
    if(jBtn) jBtn.onclick = (e) => {
        e.preventDefault();
        const j = ["Балта: Знайшли гаманець. Купили радіо!", "Аргумент TV: Новини швидше за вітер.", "Погода: Сонце світить, новини йдуть!"];
        document.getElementById('joke-display').innerHTML = `<p style="padding:10px; border-left:3px solid red; background:#111; margin-top:10px;">${j[Math.floor(Math.random()*j.length)]}</p>`;
    };
    
    // Відео (HLS)
    const v = document.getElementById('video');
    const vSrc = 'https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8';
    if(v) {
        if (Hls.isSupported()) {
            const hls = new Hls(); hls.loadSource(vSrc); hls.attachMedia(v);
        } else { v.src = vSrc; }
    }

    document.getElementById('city-select').onchange = (e) => updateWeather(e.target.value);
}

// ПРЯМИЙ ЗАПУСК
startCore();
initInteractions();
updateWeather("Balta");
fetchNews();
setInterval(fetchNews, 300000);
</script>
