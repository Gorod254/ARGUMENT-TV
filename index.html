<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРГУМЕНТ TV — 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #e30613; --dark: #000; --gray: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        header { background: var(--dark); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        #digital-clock { font-family: monospace; font-size: 18px; color: var(--red); font-weight: bold; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

        .currency-bar { background: #0a0a0a; padding: 12px 15px; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #222; flex-wrap: wrap; }
        .curr-item { font-size: 14px; font-weight: bold; color: #888; display: flex; align-items: center; gap: 6px; }
        .curr-item span { color: #fff; font-size: 15px; }

        .container { max-width: 850px; margin: 0 auto; padding: 15px; }
        .player-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; margin-bottom: 20px; }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }

        .section-title { font-size: 13px; text-transform: uppercase; color: var(--red); font-weight: bold; margin: 25px 0 10px; display: block; border-left: 3px solid var(--red); padding-left: 10px; }
        
        .weather-card { background: var(--gray); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .weather-main { display: flex; justify-content: space-between; align-items: center; }
        .temp { font-size: 32px; font-weight: bold; color: var(--red); }
        select { background: #1a1a1a; color: #fff; border: 1px solid var(--red); padding: 8px; border-radius: 6px; outline: none; }

        #news-container { background: #050505; border-radius: 12px; height: 500px; overflow-y: auto; border: 1px solid #1a1a1a; }
        .news-item { display: block; padding: 12px 15px; border-bottom: 1px solid #1a1a1a; text-decoration: none; color: white; transition: 0.2s; }
        .news-item:hover { background: #111; }
        .news-meta { font-size: 10px; color: var(--red); font-weight: bold; margin-bottom: 3px; text-transform: uppercase; }

        .side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--gray); z-index: 2000; transition: 0.3s; padding: 20px; border-right: 2px solid var(--red); }
        .side-menu.active { left: 0; }
        .menu-link { display: block; padding: 15px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <button class="menu-btn" onclick="document.getElementById('sideMenu').classList.toggle('active')">☰</button>
        <div style="font-weight:bold; font-size:18px;">АРГУМЕНТ <span style="color:var(--red)">TV</span></div>
    </div>
    <div id="digital-clock">00:00:00</div>
</header>

<div class="currency-bar">
    <div class="curr-item">🇺🇸 USD <span id="rate-USD">--</span></div>
    <div class="curr-item">🇪🇺 EUR <span id="rate-EUR">--</span></div>
    <div class="curr-item">🇵🇱 PLN <span id="rate-PLN">--</span></div>
    <div class="curr-item">🇬🇧 GBP <span id="rate-GBP">--</span></div>
    <div class="curr-item">🇲🇩 MDL <span id="rate-MDL">--</span></div>
</div>

<div class="player-box">

<iframe 
    width="100%" 
    height="100%" 
    src="https://www.youtube.com/embed/live_stream?channel=UC-VP7uBgZvooMsjP5TNNPLw"
    title="Суспільне — прямий ефір"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
</iframe>

</div>

<div style="font-size:12px; color:#888; margin-top:-10px; margin-bottom:15px;">
Джерело трансляції: Суспільне (офіційний ефір)
</div>

    <span class="section-title">☁️ ПРОГНОЗ ПОГОДИ</span>
    <div class="weather-card">
        <div class="weather-main">
            <div>
                <select id="city-select">
                    <option value="Balta" selected>Балта</option>
                    <option value="Podilsk">Подільськ</option>
                    <option value="Kodyma">Кодима</option>
                    <option value="Ananiv">Ананьїв</option>
                </select>
                <div id="w-desc" style="margin-top:5px; color:#888;">Оновлення...</div>
            </div>
            <div class="temp" id="w-temp">--°C</div>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:15px; margin-top:12px; font-size:13px; color:#888; border-top:1px solid #222; padding-top:10px;">
            <span>💨 Вітер: <b id="w-wind" style="color:#eee">--</b> м/с</span>
            <span>💧 Вологість: <b id="w-hum" style="color:#eee">--</b>%</span>
            <span>⏲️ Тиск: <b id="w-press" style="color:#eee">--</b> мм</span>
        </div>
    </div>

    <span class="section-title">🗞️ ГАРЯЧІ НОВИНИ (УП, ТСН, 24, СУСПІЛЬНЕ, УНІАН)</span>
    <div id="news-container"></div>
</div>

<div id="sideMenu" class="side-menu">
    <div style="text-align: right; margin-bottom: 20px;">
        <span onclick="document.getElementById('sideMenu').classList.remove('active')" style="cursor:pointer; color:var(--red); font-size:24px;">✕</span>
    </div>
    <div class="menu-link" onclick="showJoke()">🎭 АНЕКДОТ ДНЯ</div>
    <a href="https://alerts.in.ua/" target="_blank" class="menu-link">🗺️ КАРТА ТРИВОГ</a>
</div>

<script>
// --- ГОДИННИК ---
function updateClock() {
    document.getElementById('digital-clock').textContent = new Date().toLocaleTimeString('uk-UA');
}
setInterval(updateClock, 1000);
updateClock();

// --- ВАЛЮТА ---
async function updateCurrency() {
    try {
        const r = await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json');
        const d = await r.json();
        const t = { 'USD': 'rate-USD', 'EUR': 'rate-EUR', 'GBP': 'rate-GBP', 'PLN': 'rate-PLN', 'MDL': 'rate-MDL' };
        d.forEach(i => { if(t[i.cc]) document.getElementById(t[i.cc]).textContent = i.rate.toFixed(2); });
    } catch(e) { console.error("Currency error"); }
}
updateCurrency();

// --- ПЛЕЄР ---


// --- ПОГОДА (з тиском та вологістю) ---
async function updateWeather(city) {
    const coords = { "Balta": {lat: 47.93, lon: 29.62}, "Podilsk": {lat: 47.74, lon: 29.53}, "Kodyma": {lat: 48.09, lon: 29.12}, "Ananiv": {lat: 47.72, lon: 29.96} };
    const c = coords[city];
    try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,relative_humidity_2m,weather_code,surface_pressure,wind_speed_10m&wind_speed_unit=ms`);
        const d = await r.json();
        const states = { 0: "Ясно ☀️", 1: "Переважно ясно", 2: "Мінлива хмарність ⛅", 3: "Похмуро ☁️", 61: "Дощ 🌧️", 71: "Сніг ❄️", 95: "Гроза ⚡" };
        
        document.getElementById('w-temp').textContent = Math.round(d.current.temperature_2m) + "°C";
        document.getElementById('w-desc').textContent = states[d.current.weather_code] || "Хмарно";
        document.getElementById('w-wind').textContent = d.current.wind_speed_10m.toFixed(1);
        document.getElementById('w-hum').textContent = d.current.relative_humidity_2m;
        document.getElementById('w-press').textContent = Math.round(d.current.surface_pressure * 0.750062);
    } catch(e) {}
}
updateWeather("Balta");
document.getElementById('city-select').onchange = (e) => updateWeather(e.target.value);

// --- НОВИНИ (6 джерел) ---
async function fetchNews() {
    const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
    const sources = [
        { name: "УП", url: "https://www.pravda.com.ua/rss/" },
        { name: "ТСН", url: "https://tsn.ua/rss/full.rss" },
        { name: "24 КАНАЛ", url: "https://24tv.ua/rss/all.xml" },
        { name: "СУСПІЛЬНЕ", url: "https://suspilne.media/rss/feeds/all.xml" },
        { name: "УНІАН", url: "https://rss.unian.net/site/news_ukr.rss" },
        { name: "АПОСТРОФ", url: "https://apostrophe.ua/ua/rss" }
    ];
    
    let allNews = [];
    for (let src of sources) {
        try {
            const r = await fetch(proxy + encodeURIComponent(src.url) + "&t=" + Date.now());
            const d = await r.json();
            if(d.items) {
                d.items.forEach(i => {
                    allNews.push({
                        title: i.title,
                        link: i.link,
                        date: new Date(i.pubDate),
                        source: src.name
                    });
                });
            }
        } catch(e) {}
    }

    allNews.sort((a, b) => b.date - a.date); // Сортування за часом (свіжі зверху)

    document.getElementById('news-container').innerHTML = allNews.slice(0, 50).map(n => `
        <a href="${n.link}" target="_blank" class="news-item">
            <div class="news-meta">${n.source} | ${n.date.toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'})}</div>
            <div style="font-weight:500; line-height:1.4;">${n.title}</div>
        </a>
    `).join('');
}
fetchNews();
setInterval(fetchNews, 300000); // Оновлення кожні 5 хвилин

// --- АНЕКДОТИ ---
function showJoke() {
    const jokes = [
        'Купив собаку, назвав "Приват". Тепер він гавкає на відсотки.',
        'Одеса. Дружина: "Моня, ти бачив курс долара?" — "Сара, не дивись на ніч ужастики!"',
        'Програміст перед сном ставить дві склянки: з водою (якщо захоче пити) і порожню (якщо не захоче).'
    ];
    alert(jokes[Math.floor(Math.random() * jokes.length)]);
}
</script>
</body>
</html>
