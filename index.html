<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРГУМЕНТ TV — Інфо-Портал 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #e30613; --dark: #000; --gray: #111; --text: #eee; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* ШАПКА */
        header { background: var(--dark); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .live-indicator { font-weight: bold; font-size: 20px; text-transform: uppercase; }
        #digital-clock { font-family: monospace; font-size: 18px; color: var(--red); font-weight: bold; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

        /* ВАЛЮТА */
        .currency-bar { background: #fff; color: #000; padding: 5px 0; font-size: 12px; font-weight: bold; border-bottom: 1px solid #333; }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; }

        /* ВІДЕО */
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px; }
        video { width: 100%; height: 100%; }

        /* ПОГОДА */
        .weather-card { background: var(--gray); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        select { background: #222; color: #fff; border: 1px solid var(--red); padding: 5px; border-radius: 5px; outline: none; }
        .temp { font-size: 28px; font-weight: bold; color: var(--red); }

        /* НОВИНИ */
        .section-title { font-size: 14px; text-transform: uppercase; color: var(--red); font-weight: bold; margin: 20px 0 10px; display: block; border-left: 3px solid var(--red); padding-left: 10px; }
        #news-container { background: #050505; border-radius: 12px; height: 600px; overflow-y: auto; border: 1px solid #1a1a1a; }
        .news-item { display: block; padding: 15px; border-bottom: 1px solid #1a1a1a; text-decoration: none; color: white; transition: 0.2s; }
        .news-item:hover { background: #111; }
        .news-meta { font-size: 11px; color: var(--red); margin-bottom: 4px; font-weight: bold; }

        /* МЕНЮ */
        .side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--gray); z-index: 2000; transition: 0.3s; padding: 20px; border-right: 2px solid var(--red); }
        .side-menu.active { left: 0; }
        .menu-link { display: block; padding: 15px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; font-weight: bold; }

        /* СКРОЛЛБАР */
        #news-container::-webkit-scrollbar { width: 4px; }
        #news-container::-webkit-scrollbar-thumb { background: var(--red); }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="live-indicator">АРГУМЕНТ <span style="color:var(--red)">TV</span></div>
    </div>
    <div id="digital-clock">00:00:00</div>
</header>

<div class="currency-bar">
    <marquee scrollamount="4">Завантаження курсів валют...</marquee>
</div>

<div class="container">
    <!-- ПЛЕЄР -->
    <div class="player-box">
        <video id="video" controls autoplay playsinline muted></video>
    </div>

    <!-- ПОГОДА -->
    <span class="section-title">☁️ МЕТЕОПРОГНОЗ</span>
    <div class="weather-card">
        <div>
            <select id="city-select">
                <option value="Balta">Балта</option>
                <option value="Podilsk">Подільськ</option>
                <option value="Kodyma">Кодима</option>
                <option value="Ananiv">Ананьїв</option>
                <option value="Okny">Окни</option>
            </select>
            <div class="desc" style="margin-top: 8px; font-size: 14px; color: #888;">Оновлення...</div>
        </div>
        <div class="temp">--°C</div>
    </div>

    <!-- НОВИНИ -->
    <span class="section-title">🗞️ СТРІЧКА НОВИН: 24 КАНАЛ | ТСН | УНІАН</span>
    <div id="news-container">
        <div style="padding: 20px; text-align: center; color: #555;">Завантаження свіжих новин...</div>
    </div>
</div>

<!-- МЕНЮ -->
<div id="sideMenu" class="side-menu">
    <div style="text-align: right; margin-bottom: 20px;">
        <span onclick="document.getElementById('sideMenu').classList.remove('active')" style="cursor:pointer; color:var(--red); font-size:24px;">✕</span>
    </div>
    <a href="#" class="menu-link" id="jokeBtn">🎭 АНЕКДОТ ДНЯ</a>
    <a href="https://alerts.in.ua/" target="_blank" class="menu-link">🗺️ КАРТА ТРИВОГ</a>
    <div id="joke-display"></div>
</div>

<script>
// 1. КОНФІГ ТА КООРДИНАТИ
const CONFIG = {
    coords: {
        "Balta": {lat: 47.93, lon: 29.62}, 
        "Podilsk": {lat: 47.74, lon: 29.53},
        "Kodyma": {lat: 48.09, lon: 29.12}, 
        "Ananiv": {lat: 47.72, lon: 29.96},
        "Okny": {lat: 47.53, lon: 29.46}
    }
};

// 2. ГОДИННИК ТА ВАЛЮТА
function startCore() {
    setInterval(() => {
        const el = document.getElementById('digital-clock');
        if(el) el.textContent = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

    fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json')
        .then(r => r.json()).then(data => {
            const codes = ['USD', 'EUR', 'PLN'];
            let text = "Курс НБУ: ";
            data.filter(i => codes.includes(i.cc)).forEach(i => {
                text += `${i.cc}: ${i.rate.toFixed(2)}грн | `;
            });
            document.querySelector('.currency-bar marquee').textContent = text + " • ПРЯМИЙ ЕФІР АРГУМЕНТ TV";
        }).catch(() => {});
}

// 3. ПОГОДА
async function updateWeather(city) {
    const c = CONFIG.coords[city];
    const weatherText = document.querySelector('.desc');
    const tempText = document.querySelector('.temp');
    
    try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true`);
        const d = await r.json();
        const t = Math.round(d.current_weather.temperature);
        const code = d.current_weather.weathercode;
        
        let desc = "Ясно";
        if (code >= 1 && code <= 3) desc = "Хмарно";
        else if (code >= 51) desc = "Опади";
        
        tempText.textContent = (t > 0 ? "+" : "") + t + "°C";
        weatherText.textContent = desc;
    } catch(e) { weatherText.textContent = "Помилка API"; }
}

// 4. НОВИНИ (24 КАНАЛ, ТСН, УНІАН)
async function fetchNews() {
    const container = document.getElementById('news-container');
    const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
    const sources = {
        "24 Канал": "https://24tv.ua/rss/all.xml",
        "ТСН": "https://tsn.ua/rss/full.rss",
        "УНІАН": "https://rss.unian.net/site/news_ukr.rss"
        "УП": "https://www.pravda.com.ua/rss/"
        "СУСПІЛЬНЕ": "https://suspilne.media/rss/](https://suspilne.media/rss/"
        "СУСПІЛЬНЕ ОДЕСА": "https://suspilne.media/odesa/rss/"
        "ГРОМАДСЬКЕ": "https://hromadske.ua/rss"
    };

    let allNews = [];
    for (let [name, url] of Object.entries(sources)) {
        try {
            const r = await fetch(proxy + encodeURIComponent(url));
            const d = await r.json();
            if (d.items) {
                d.items.forEach(item => {
                    allNews.push({
                        title: item.title, link: item.link,
                        time: new Date(item.pubDate), source: name
                    });
                });
            }
        } catch (e) {}
    }
    
    allNews.sort((a, b) => b.time - a.time);
    
    container.innerHTML = allNews.slice(0, 40).map(n => `
        <a href="${n.link}" target="_blank" class="news-item">
            <div class="news-meta">${n.source} | ${n.time.getHours()}:${String(n.time.getMinutes()).padStart(2,'0')}</div>
            <div style="font-weight:500;">${n.title}</div>
        </a>
    `).join('');
}

// 5. ВЗАЄМОДІЯ
function init() {
    // Відео HLS
    const v = document.getElementById('video');
    const vSrc = 'https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8';
    if (Hls.isSupported()) {
        const hls = new Hls(); hls.loadSource(vSrc); hls.attachMedia(v);
    } else { v.src = vSrc; }

    // Меню
    document.getElementById('menuBtn').onclick = () => document.getElementById('sideMenu').classList.toggle('active');

    // Анекдоти
    document.getElementById('jokeBtn').onclick = (e) => {
        e.preventDefault();
        const j = ["У Балті на ринку: — Чого ковбаса дорога? — Бо з Подільська пішки йшла!","Якщо на балтському ринку тихо - значить сьогодні понеділок!", "Тільки в Балті таксист знає кожну ямку по імені."];
        document.getElementById('joke-display').innerHTML = `<p style="color:var(--red); padding:10px; font-style:italic;">${j[Math.floor(Math.random()*j.length)]}</p>`;
    };

    document.getElementById('city-select').onchange = (e) => updateWeather(e.target.value);

    startCore();
    updateWeather("Balta");
    fetchNews();
    setInterval(fetchNews, 900000); // Оновлення раз на 15 хв
}
<footer>
    <div class="footer-content">
        <p><strong>АРГУМЕНТ TV</strong> — агрегатор новин. Весь аудіовізуальний контент належить його законним представникам та правовласникам.</p>
        <p>© 2026 Всі права захищені. Використання матеріалів дозволено лише за умови посилання на першоджерело.</p>
    </div>
</footer>

window.onload = init;
</script>
</body>
</html>
